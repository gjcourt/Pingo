version: "2"

linters:
  default: none
  enable:
    - govet
    - ineffassign
    - unused
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - contextcheck
    - durationcheck
    - errorlint
    - gosec
    - misspell
    - nilerr
    - noctx
    - prealloc
    - unconvert
    - depguard
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    gosec:
      excludes:
        - G104 # Duplicated by errcheck
    govet:
      enable:
        - shadow
    revive:
      rules:
        - name: exported
          arguments:
            - disableStutteringCheck
    depguard:
      rules:
        domain-no-other-internal:
          files:
            - "**/internal/domain/**/*.go"
          deny:
            - pkg: "github.com/george/pingo/internal/ports"
              desc: "domain must not import ports"
            - pkg: "github.com/george/pingo/internal/app"
              desc: "domain must not import app"
            - pkg: "github.com/george/pingo/internal/adapters"
              desc: "domain must not import adapters"

        ports-no-impl:
          files:
            - "**/internal/ports/**/*.go"
          deny:
            - pkg: "github.com/george/pingo/internal/app"
              desc: "ports must not import app (ports are abstract contracts)"
            - pkg: "github.com/george/pingo/internal/adapters"
              desc: "ports must not import adapters"

        app-no-adapters:
          files:
            - "**/internal/app/**/*.go"
          deny:
            - pkg: "github.com/george/pingo/internal/adapters"
              desc: "app layer must depend only on port interfaces, not adapter implementations"

        adapters-no-cross-import:
          files:
            - "**/internal/adapters/**/*.go"
          deny:
            - pkg: "github.com/george/pingo/internal/adapters/cloudflare"
              desc: "adapters must not import sibling adapters"
            - pkg: "github.com/george/pingo/internal/adapters/ipfetcher"
              desc: "adapters must not import sibling adapters"

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
